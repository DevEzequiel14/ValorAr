<app-loading *ngIf="loading"></app-loading>

<app-state-message
  *ngIf="!loading && errorMessage"
  type="error"
  [message]="errorMessage"
  [showRetry]="true"
  (retry)="fetchRendimientos()"
></app-state-message>

<app-state-message
  *ngIf="!loading && !errorMessage && isEmpty"
  type="empty"
  message="No hay rendimientos disponibles."
  [showRetry]="true"
  (retry)="fetchRendimientos()"
></app-state-message>

<ng-container *ngIf="!loading && !errorMessage && !isEmpty">
  <app-select-search
    [title]="'Selecciona una moneda:'"
    [items]="availableCurrencies"
    [selectedItem]="selectedCurrency"
    (selectionChange)="onCurrencyChange($event)"
  >
  </app-select-search>
  <div class="chart-container" @scaleFadeIn>
    <canvas baseChart [data]="barChartData" [options]="barChartOptions" [type]="barChartType">
    </canvas>
  </div>
</ng-container>
