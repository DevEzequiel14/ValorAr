<app-loading *ngIf="loading"></app-loading>

<app-state-message
  *ngIf="!loading && errorMessage"
  type="error"
  [message]="errorMessage"
  [showRetry]="true"
  (retry)="fetchInflacion()"
></app-state-message>

<app-state-message
  *ngIf="!loading && !errorMessage && isEmpty"
  type="empty"
  message="No hay datos de inflación disponibles."
  [showRetry]="true"
  (retry)="fetchInflacion()"
></app-state-message>

<ng-container *ngIf="!loading && !errorMessage && !isEmpty">
  <div class="select-container">
    <label for="year" class="select-label">Selecciona un año:</label>
    <select id="year" class="select-dropdown" [(ngModel)]="selectedYear" (change)="filterByYear()">
      <option *ngFor="let year of availableYears" [value]="year">
        {{ year }}
      </option>
    </select>
  </div>

  <div class="chart-container" @scaleFadeIn>
    <canvas baseChart [data]="lineChartData" [options]="lineChartOptions" [type]="lineChartType">
    </canvas>
  </div>
</ng-container>
