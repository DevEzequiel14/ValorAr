@if (loading()) {
  <app-loading></app-loading>
}

@if (!loading() && errorMessage()) {
  <app-state-message
    type="error"
    [message]="errorMessage()!"
    [showRetry]="true"
    (retry)="fetchDolars()"
  ></app-state-message>
}

@if (!loading() && !errorMessage() && isEmpty()) {
  <app-state-message
    type="empty"
    message="No hay cotizaciones disponibles en este momento."
    [showRetry]="true"
    (retry)="fetchDolars()"
  ></app-state-message>
}

@if (!loading() && !errorMessage() && !isEmpty()) {
  <h2 class="dollars-title">Cotizaciones de todas las casas de cambio</h2>
  @if (lastUpdated) {
    <p class="dollars-updated">{{ lastUpdated }}</p>
  }
  <div class="chart-container" @scaleFadeIn>
    <canvas baseChart [data]="barChartData" [options]="barChartOptions" [type]="barChartType">
    </canvas>
  </div>
}
