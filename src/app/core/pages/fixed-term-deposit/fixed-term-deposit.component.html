<app-loading *ngIf="loading"></app-loading>

<app-state-message
  *ngIf="!loading && errorMessage"
  type="error"
  [message]="errorMessage"
  [showRetry]="true"
  (retry)="fetchFixedTermDeposit()"
></app-state-message>

<app-state-message
  *ngIf="!loading && !errorMessage && isEmpty"
  type="empty"
  message="No hay tasas de plazo fijo disponibles."
  [showRetry]="true"
  (retry)="fetchFixedTermDeposit()"
></app-state-message>

<ng-container *ngIf="!loading && !errorMessage && !isEmpty">
  <div class="fixed-term-deposit">
    <h2 class="fixed-title">TNA por Entidad</h2>
    <div class="chart-container" @scaleFadeIn>
      <canvas baseChart [data]="barChartData" [options]="barChartOptions" [type]="barChartType">
      </canvas>
    </div>
  </div>
</ng-container>
